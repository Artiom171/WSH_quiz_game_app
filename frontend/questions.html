<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Игра</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
      background: #111827;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.45);
    }

    h3,
    h2 {
      margin: 0;
      line-height: 1.2;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #94a3b8;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 16px 14px;
      margin-top: 16px;
      border-radius: 16px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 16px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      margin-top: 20px;
      padding: 16px;
      width: 100%;
      background: #38bdf8;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      color: #0f172a;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    button:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
        border-radius: 20px;
      }

      h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h3 id="username"></h3>
  <h2 id="questionText"></h2>

  <input type="text" id="answerInput" placeholder="Ваш ответ">
  <button onclick="sendAnswer()">Ответить</button>
</div>

<script>
const session_id = localStorage.getItem("session_id");
const user_name = localStorage.getItem("user_name");

document.getElementById("username").innerText = "Игрок: " + user_name;

// 🎮 логика игры
let round = 1;
let questionNumber = 1;

const roundLimits = {
  1: 10,
  2: 20,
  3: 15,
  4: 20
};

// показать текущий вопрос
function loadQuestion() {
  document.getElementById("questionText").innerText =
    `Тур ${round}, Вопрос ${questionNumber}`;
}

// переход к следующему
function nextQuestion() {
  questionNumber++;

  if (questionNumber > roundLimits[round]) {
    round++;
    questionNumber = 1;
  }

  if (round > 4) {
    alert("Игра окончена");
    return;
  }

  loadQuestion();
}

// отправка ответа
async function sendAnswer() {
  const answer = document.getElementById("answerInput").value;

  if (!answer) return;

  await fetch("/answers", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      session_id: session_id,
      round: round,
      question_number: questionNumber,
      answer_text: answer
    })
  });

  document.getElementById("answerInput").value = "";

  nextQuestion();
}

// старт
loadQuestion();
</script>

</body>
</html>
