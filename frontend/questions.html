<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Игра</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
    }

    .container {
      width: 100%;
      max-width: 500px;
      max-height: 94vh;
      text-align: center;
      background: #111827;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.45);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      overflow-y: auto;
    }

    h3, h2 {
      margin: 0;
      line-height: 1.2;
    }

    h3 {
      font-size: 18px;
      color: #94a3b8;
    }

    h2 {
      font-size: 28px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 16px;
      font-family: inherit;
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      padding: 16px;
      width: 100%;
      background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      font-family: inherit;
      color: #0f172a;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
      transform: translateY(-1px);
      box-shadow: 0 12px 25px rgba(56, 189, 248, 0.24);
    }

    /* ===== THEMED TOUR VIEW ===== */

    #themedView {
      display: none;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      text-align: left;
    }

    #themedView.active {
      display: flex;
    }

    #themedTitle {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #38bdf8;
      margin: 0;
    }

    .themed-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      max-height: 55vh;
      padding-right: 2px;
    }

    .themed-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .themed-number {
      font-size: 13px;
      font-weight: 700;
      color: #475569;
      min-width: 22px;
      text-align: right;
      flex-shrink: 0;
    }

    .themed-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      width: 100%;
    }

    .themed-input::placeholder {
      color: #475569;
    }

    .themed-input:focus {
      border-color: #38bdf8;
    }

    /* ===== WAITING SCREEN ===== */

    #tourWaiting {
      position: fixed;
      inset: 0;
      background: #080d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #tourWaiting.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      will-change: transform;
    }

    .blob-blue {
      width: 520px;
      height: 520px;
      background: rgba(37, 99, 235, 0.2);
      top: -160px;
      left: -120px;
      animation: blobDrift 12s ease-in-out infinite;
    }

    .blob-purple {
      width: 460px;
      height: 460px;
      background: rgba(109, 40, 217, 0.15);
      bottom: -130px;
      right: -110px;
      animation: blobDrift 15s ease-in-out infinite reverse;
    }

    @keyframes blobDrift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.08); }
      66%       { transform: translate(-20px, 30px) scale(0.94); }
    }

    #particlesContainer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: riseUp linear infinite;
      will-change: transform, opacity;
    }

    @keyframes riseUp {
      0%   { transform: translateY(0) scale(0.4); opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 0.4; }
      100% { transform: translateY(-88vh) scale(0.9); opacity: 0; }
    }

    .waiting-content {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 0 24px;
    }

    .waiting-title {
      margin: 0 0 22px;
      font-size: 48px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow:
        0 0 24px rgba(56, 189, 248, 0.75),
        0 0 64px rgba(37, 99, 235, 0.4);
      animation: titleFloat 5s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .waiting-subtitle {
      margin: 0;
      font-size: 17px;
      color: #475569;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      body { padding: 16px; }
      .container { padding: 20px; border-radius: 20px; }
      h2 { font-size: 24px; }
      .waiting-title { font-size: 34px; }
    }
  </style>
</head>
<body>

<div id="tourWaiting">
  <div class="glow-blob blob-blue"></div>
  <div class="glow-blob blob-purple"></div>
  <div id="particlesContainer"></div>
  <div class="waiting-content">
    <h1 class="waiting-title" id="waitingTitle"></h1>
    <p class="waiting-subtitle">Ведущий скоро откроет тур<span id="waitingDots"></span></p>
  </div>
</div>

<div class="container">
  <h3 id="username"></h3>

  <!-- Ordinary tour view -->
  <div id="ordinaryView">
    <h2 id="questionText"></h2>
    <input type="text" id="answerInput" placeholder="Ваш ответ" />
    <button onclick="sendAnswer()">Ответить</button>
  </div>

  <!-- Themed tour view -->
  <div id="themedView">
    <p id="themedTitle"></p>
    <div class="themed-list" id="themedInputs"></div>
    <button onclick="sendThemedAnswers()">Отправить все</button>
  </div>
</div>

<script>
const session_id = localStorage.getItem("session_id");
const user_name  = localStorage.getItem("user_name");

document.getElementById("username").innerText = "Игрок: " + user_name;

let round            = 1;
let questionNumber   = 1;
let roundLimits      = {};
let tourConfigs      = [];
let totalRounds      = 0;
let currentActiveTour = 0;
let dotsInterval     = null;

// ===== PARTICLES =====

(function createParticles() {
  const container = document.getElementById("particlesContainer");
  const colors = [
    "rgba(56, 189, 248, 0.7)",
    "rgba(37, 99, 235, 0.6)",
    "rgba(147, 197, 253, 0.5)",
    "rgba(255, 255, 255, 0.2)",
  ];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const size = Math.random() * 4 + 2;
    p.style.cssText = [
      `width:${size}px`,
      `height:${size}px`,
      `left:${(Math.random() * 100).toFixed(1)}%`,
      `bottom:${(Math.random() * 25).toFixed(1)}%`,
      `background:${colors[Math.floor(Math.random() * colors.length)]}`,
      `animation-duration:${(Math.random() * 8 + 7).toFixed(1)}s`,
      `animation-delay:${(Math.random() * 10).toFixed(1)}s`,
    ].join(";");
    container.appendChild(p);
  }
})();

// ===== WAITING SCREEN =====

function showWaiting(tourNum) {
  const overlay = document.getElementById("tourWaiting");
  document.getElementById("waitingTitle").textContent = `Тур ${tourNum}`;
  overlay.classList.remove("hidden");
  overlay.classList.add("visible");

  let dotsCount = 0;
  clearInterval(dotsInterval);
  dotsInterval = setInterval(() => {
    dotsCount = (dotsCount + 1) % 4;
    document.getElementById("waitingDots").textContent = ".".repeat(dotsCount);
  }, 500);
}

function hideWaiting() {
  const overlay = document.getElementById("tourWaiting");
  clearInterval(dotsInterval);
  overlay.classList.add("hidden");
  setTimeout(() => overlay.classList.remove("visible", "hidden"), 650);
}

// ===== TOUR VIEWS =====

function showQuestion() {
  hideWaiting();
  const config = tourConfigs[round - 1];
  if (config && config.type === "themed") {
    showThemedTour(config.questions);
  } else {
    showOrdinaryQuestion();
  }
}

function showOrdinaryQuestion() {
  document.getElementById("ordinaryView").style.display = "";
  document.getElementById("themedView").classList.remove("active");
  loadQuestion();
}

function showThemedTour(count) {
  document.getElementById("ordinaryView").style.display = "none";
  document.getElementById("themedView").classList.add("active");
  document.getElementById("themedTitle").textContent = `Тур ${round} — Тематический`;

  const list = document.getElementById("themedInputs");
  list.innerHTML = "";
  for (let i = 1; i <= count; i++) {
    const item = document.createElement("div");
    item.className = "themed-item";
    item.innerHTML = `
      <span class="themed-number">${i}.</span>
      <input class="themed-input" type="text" placeholder="Ответ ${i}" data-question="${i}" />
    `;
    list.appendChild(item);
  }
}

function loadQuestion() {
  document.getElementById("questionText").innerText = `Тур ${round}, Вопрос ${questionNumber}`;
}

// ===== GAME OVER =====

function showGameOver() {
  document.getElementById("ordinaryView").style.display = "";
  document.getElementById("themedView").classList.remove("active");
  document.getElementById("questionText").innerText = "Игра окончена";
  document.getElementById("answerInput").style.display = "none";
  document.querySelector("#ordinaryView button").style.display = "none";
}

// ===== ANSWER SUBMISSION =====

function advanceRound() {
  round++;
  questionNumber = 1;

  if (round > totalRounds) {
    showGameOver();
    return;
  }

  if (currentActiveTour < round) {
    showWaiting(round);
    pollTour();
  } else {
    showQuestion();
  }
}

function nextQuestion() {
  questionNumber++;

  if (questionNumber > roundLimits[round]) {
    advanceRound();
    return;
  }

  loadQuestion();
}

async function sendAnswer() {
  const answer = document.getElementById("answerInput").value;
  if (!answer) {
    alert("Пожалуйста, введите ответ.");
    return;
  }

  await fetch("/answers", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      session_id,
      round,
      question_number: questionNumber,
      answer_text: answer
    })
  });

  document.getElementById("answerInput").value = "";
  nextQuestion();
}

async function sendThemedAnswers() {
  const inputs = document.querySelectorAll(".themed-input");

  for (const input of inputs) {
    const q = parseInt(input.dataset.question);
    await fetch("/answers", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id,
        round,
        question_number: q,
        answer_text: input.value
      })
    });
  }

  advanceRound();
}

// ===== POLLING =====

function pollTour() {
  fetch("/game/status")
    .then(r => r.json())
    .then(data => {
      currentActiveTour = data.current_tour || 0;
      if (currentActiveTour >= round) {
        showQuestion();
      } else {
        setTimeout(pollTour, 2000);
      }
    })
    .catch(() => setTimeout(pollTour, 3000));
}

// ===== INIT =====

async function init() {
  const res  = await fetch("/game/status");
  const data = await res.json();

  tourConfigs   = data.config.tours;
  totalRounds   = tourConfigs.length;
  currentActiveTour = data.current_tour || 0;

  tourConfigs.forEach((tour, i) => {
    roundLimits[i + 1] = tour.questions;
  });

  if (currentActiveTour < 1) {
    showWaiting(1);
    pollTour();
  } else {
    showQuestion();
  }
}

init();
</script>

</body>
</html>
