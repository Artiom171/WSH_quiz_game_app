<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Игра</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
    }

    .container {
      width: 100%;
      max-width: 500px;
      min-height: 340px;
      max-height: 94vh;
      text-align: center;
      background: #111827;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.45);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      overflow: hidden;
    }

    h3,
    h2 {
      margin: 0;
      line-height: 1.2;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #94a3b8;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      margin-top: 16px;
      border-radius: 16px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 16px;
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      margin-top: 4px;
      padding: 16px;
      width: 100%;
      background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      color: #0f172a;
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%);
      transform: translateY(-1px);
      box-shadow: 0 12px 25px rgba(56, 189, 248, 0.24);
    }

    #tourWaiting {
      position: fixed;
      inset: 0;
      background: #080d1a;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
      transition: opacity 0.65s ease;
    }

    #tourWaiting.visible {
      display: flex;
    }

    #tourWaiting.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      will-change: transform;
    }

    .blob-blue {
      width: 520px;
      height: 520px;
      background: rgba(37, 99, 235, 0.2);
      top: -160px;
      left: -120px;
      animation: blobDrift 12s ease-in-out infinite;
    }

    .blob-purple {
      width: 460px;
      height: 460px;
      background: rgba(109, 40, 217, 0.15);
      bottom: -130px;
      right: -110px;
      animation: blobDrift 15s ease-in-out infinite reverse;
    }

    @keyframes blobDrift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.08); }
      66%       { transform: translate(-20px, 30px) scale(0.94); }
    }

    #particlesContainer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: riseUp linear infinite;
      will-change: transform, opacity;
    }

    @keyframes riseUp {
      0%   { transform: translateY(0) scale(0.4); opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 0.4; }
      100% { transform: translateY(-88vh) scale(0.9); opacity: 0; }
    }

    .waiting-content {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 0 24px;
    }

    .waiting-title {
      margin: 0 0 22px;
      font-size: 48px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow:
        0 0 24px rgba(56, 189, 248, 0.75),
        0 0 64px rgba(37, 99, 235, 0.4);
      animation: titleFloat 5s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .waiting-subtitle {
      margin: 0;
      font-size: 17px;
      color: #475569;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 20px;
        border-radius: 20px;
      }

      h2 {
        font-size: 24px;
      }

      .waiting-title {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>

<div id="tourWaiting">
  <div class="glow-blob blob-blue"></div>
  <div class="glow-blob blob-purple"></div>
  <div id="particlesContainer"></div>
  <div class="waiting-content">
    <h1 class="waiting-title" id="waitingTitle"></h1>
    <p class="waiting-subtitle">Ведущий скоро откроет тур<span id="waitingDots"></span></p>
  </div>
</div>

<div class="container">
  <h3 id="username"></h3>
  <h2 id="questionText"></h2>

  <input type="text" id="answerInput" placeholder="Ваш ответ">
  <button onclick="sendAnswer()">Ответить</button>
</div>

<script>
const session_id = localStorage.getItem("session_id");
const user_name = localStorage.getItem("user_name");

document.getElementById("username").innerText = "Игрок: " + user_name;

let round = 1;
let questionNumber = 1;
let roundLimits = {};
let totalRounds = 0;
let currentActiveTour = 0;
let dotsInterval = null;

(function createParticles() {
  const container = document.getElementById("particlesContainer");
  const colors = [
    "rgba(56, 189, 248, 0.7)",
    "rgba(37, 99, 235, 0.6)",
    "rgba(147, 197, 253, 0.5)",
    "rgba(255, 255, 255, 0.2)",
  ];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const size = Math.random() * 4 + 2;
    p.style.cssText = [
      `width:${size}px`,
      `height:${size}px`,
      `left:${(Math.random() * 100).toFixed(1)}%`,
      `bottom:${(Math.random() * 25).toFixed(1)}%`,
      `background:${colors[Math.floor(Math.random() * colors.length)]}`,
      `animation-duration:${(Math.random() * 8 + 7).toFixed(1)}s`,
      `animation-delay:${(Math.random() * 10).toFixed(1)}s`,
    ].join(";");
    container.appendChild(p);
  }
})();

function showWaiting(tourNum) {
  const overlay = document.getElementById("tourWaiting");
  document.getElementById("waitingTitle").textContent = `Тур ${tourNum}`;
  overlay.classList.remove("hidden");
  overlay.classList.add("visible");

  let dotsCount = 0;
  clearInterval(dotsInterval);
  dotsInterval = setInterval(() => {
    dotsCount = (dotsCount + 1) % 4;
    document.getElementById("waitingDots").textContent = ".".repeat(dotsCount);
  }, 500);
}

function showQuestion() {
  const overlay = document.getElementById("tourWaiting");
  clearInterval(dotsInterval);
  overlay.classList.add("hidden");
  setTimeout(() => overlay.classList.remove("visible", "hidden"), 650);
  loadQuestion();
}

function loadQuestion() {
  document.getElementById("questionText").innerText =
    `Тур ${round}, Вопрос ${questionNumber}`;
}

function nextQuestion() {
  questionNumber++;

  if (questionNumber > roundLimits[round]) {
    round++;
    questionNumber = 1;
  }

  if (round > totalRounds) {
    document.getElementById("questionText").innerText = "Игра окончена";
    document.getElementById("answerInput").style.display = "none";
    document.querySelector("button").style.display = "none";
    return;
  }

  if (currentActiveTour < round) {
    showWaiting(round);
    pollTour();
  } else {
    loadQuestion();
  }
}

async function sendAnswer() {
  const answer = document.getElementById("answerInput").value;

  if (!answer) {
    alert("Пожалуйста, введите ответ.");
    return;
  }

  await fetch("/answers", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      session_id: session_id,
      round: round,
      question_number: questionNumber,
      answer_text: answer
    })
  });

  document.getElementById("answerInput").value = "";
  nextQuestion();
}

function pollTour() {
  fetch("/game/status")
    .then(r => r.json())
    .then(data => {
      currentActiveTour = data.current_tour || 0;
      if (currentActiveTour >= round) {
        showQuestion();
      } else {
        setTimeout(pollTour, 2000);
      }
    })
    .catch(() => setTimeout(pollTour, 3000));
}

async function init() {
  const res = await fetch("/game/status");
  const data = await res.json();

  data.config.tours.forEach((tour, i) => {
    roundLimits[i + 1] = tour.questions;
  });
  totalRounds = data.config.tours.length;
  currentActiveTour = data.current_tour || 0;

  if (currentActiveTour < 1) {
    showWaiting(1);
    pollTour();
  } else {
    showQuestion();
  }
}

init();
</script>

</body>
</html>
