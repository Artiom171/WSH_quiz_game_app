<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ответы игроков</title>

  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #e9efff 0%, #f7f9ff 100%);
      color: #1f2937;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.15);
    }

    h2 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 18px;
      color: #0f172a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid #e2e8f0;
    }

    .round-row {
      background: #dbeafe;
      font-weight: bold;
      font-size: 16px;
    }

    .question-row {
      background: #eff6ff;
      cursor: pointer;
      font-weight: 600;
    }

    .answer-row:hover {
      background: #f1f5f9;
    }

    button {
      border: none;
      padding: 8px 12px;
      margin: 0 4px;
      border-radius: 8px;
      cursor: pointer;
    }

    .ok {
      background: #10b981;
      color: white;
    }

    .no {
      background: #ef4444;
      color: white;
    }

    .status-mark {
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Ответы игроков</h2>

  <table>
    <tbody id="answersTable"></tbody>
  </table>
</div>

<script>
async function loadAnswers() {
  const res = await fetch("/answers");
  const data = await res.json();

  const table = document.getElementById("answersTable");
  table.innerHTML = "";

  const grouped = {};

  data.forEach(item => {
    const round = item.round_number || 1;
    const question = item.question_number;

    if (!grouped[round]) grouped[round] = {};
    if (!grouped[round][question]) grouped[round][question] = [];

    grouped[round][question].push(item);
  });

  Object.keys(grouped).forEach(round => {
    const roundRow = document.createElement("tr");
    roundRow.className = "round-row";
    roundRow.innerHTML = `<td colspan="4">Тур ${round}</td>`;
    table.appendChild(roundRow);

    Object.keys(grouped[round]).forEach(question => {
      const groupId = `group-${round}-${question}`;

      const questionRow = document.createElement("tr");
      questionRow.className = "question-row";
      questionRow.innerHTML = `
        <td colspan="4" onclick="toggle('${groupId}')">
          ▶ Вопрос ${question}
        </td>
      `;
      table.appendChild(questionRow);

      const wrapper = document.createElement("tbody");
      wrapper.id = groupId;
      wrapper.style.display = "none";

      grouped[round][question].forEach(item => {
        const id = item.answer_id;

        const row = document.createElement("tr");
        row.className = "answer-row";

        row.innerHTML = `
          <td>${item.user_name}</td>
          <td>${item.question_number}</td>
          <td>${item.answer_text}</td>
          <td>
            ${
              item.is_correct !== null
                ? `<span class="status-mark">${item.is_correct ? '✔' : '✖'}</span>`
                : `<button class="ok" onclick="markAnswer(${id}, true)">✔</button>
                   <button class="no" onclick="markAnswer(${id}, false)">✖</button>`
            }
          </td>
        `;

        wrapper.appendChild(row);
      });

      table.appendChild(wrapper);
    });
  });
}

function toggle(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "table-row-group" : "none";
}

async function markAnswer(id, isCorrect) {
  await fetch(`/answers/${id}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      is_correct: isCorrect
    })
  });

  loadAnswers();
}

setInterval(loadAnswers, 3000);
loadAnswers();
</script>

</body>
</html>
