<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ответы игроков</title>

  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #e9efff 0%, #f7f9ff 100%);
      color: #1f2937;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.15);
    }

    h2 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 18px;
      color: #0f172a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    thead {
      background: linear-gradient(90deg, #2563eb 0%, #3b82f6 100%);
    }

    th,
    td {
      padding: 16px 18px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
    }

    th {
      color: #ffffff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 13px;
      text-align: left;
    }

    tbody tr:nth-child(even) {
      background: #f8fafc;
    }

    tbody tr:hover {
      background: #e0efff;
    }

    td:nth-child(4) {
      text-align: center;
      white-space: nowrap;
    }

    button {
      border: none;
      padding: 10px 14px;
      margin: 0 4px;
      border-radius: 10px;
      cursor: pointer;
      min-width: 42px;
      font-size: 14px;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.ok {
      background: #10b981;
      color: white;
    }

    button.no {
      background: #ef4444;
      color: white;
    }

    .status-mark {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
    }

    @media (max-width: 720px) {
      .container {
        padding: 20px;
      }

      table {
        display: block;
        overflow-x: auto;
      }

      thead {
        display: table-header-group;
      }

      th,
      td {
        padding: 14px 12px;
      }

      button {
        margin: 6px 2px;
      }
    }
  </style>
</head>
<body>

<div class="container">
<h2>Ответы игроков</h2>

<table>
  <thead>
    <tr>
      <th>Игрок</th>
      <th>Вопрос</th>
      <th>Ответ</th>
      <th>Статус</th>
    </tr>
  </thead>
  <tbody id="answersTable"></tbody>
</table>
</div>

<script>
async function loadAnswers() {
  const res = await fetch("/answers");
  const data = await res.json();

  const table = document.getElementById("answersTable");
  table.innerHTML = "";
  
  
  
  data.forEach(item => {

  const id = item.answer_id;

  const row = document.createElement("tr");
  
  row.id = `row-${id}`;

  row.innerHTML = `
    <td>${item.user_name}</td>
    <td>${item.question_number}</td>
    <td>${item.answer_text}</td>
    <td>
      ${
        item.is_correct !== null
          ? `<span class="status-mark">${item.is_correct ? '✔' : '✖'}</span>`
          : `<button class="ok" id="ok-${id}" onclick="markAnswer(${id}, true)">✔</button>
             <button class="no" id="no-${id}" onclick="markAnswer(${id}, false)">✖</button>`
      }
    </td>
  `;

  table.appendChild(row);
});
}

async function markAnswer(id, isCorrect) {
  await fetch(`/answers/${id}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      is_correct: isCorrect
    })
  });
  
  const okBtn = document.getElementById(`ok-${id}`);
  const noBtn = document.getElementById(`no-${id}`);

  if (okBtn) okBtn.style.display = "none";
  if (noBtn) noBtn.style.display = "none";
  
}

// автообновление
setInterval(loadAnswers, 3000);
loadAnswers();
</script>

</body>
</html>
