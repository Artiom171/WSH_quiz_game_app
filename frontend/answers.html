<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Ответы игроков</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #007bff;
      color: white;
    }

    tr:hover {
      background: #f1f1f1;
    }
  </style>
</head>
<body>

<h2>Ответы игроков</h2>

<table>
  <thead>
    <tr>
      <th>Игрок</th>
      <th>Вопрос</th>
      <th>Ответ</th>
    </tr>
  </thead>
  <tbody id="answersTable"></tbody>
</table>

<script>

async function loadAnswers() {
  const res = await fetch("http://192.168.1.18:8000/answers");
  const data = await res.json();

  const table = document.getElementById("answersTable");
  table.innerHTML = "";
  
  
  
  data.forEach(item => {

  const id = item.answer_id;

  const row = document.createElement("tr");
  
  row.id = `row-${id}`;

  row.innerHTML = `
    <td>${item.user_name}</td>
    <td>${item.question_number}</td>
    <td>${item.answer_text}</td>
    <td>
      <button id="ok-${id}" onclick="markAnswer(${id}, true)">✔</button>
      <button id="no-${id}" onclick="markAnswer(${id}, false)">✖</button>
    </td>
  `;

  table.appendChild(row);
});
}

async function markAnswer(id, isCorrect) {
  await fetch(`http://192.168.1.18:8000/answers/${id}`, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      is_correct: isCorrect
    })
  });
  
  const okBtn = document.getElementById(`ok-${id}`);
  const noBtn = document.getElementById(`no-${id}`);

  if (okBtn) okBtn.style.display = "none";
  if (noBtn) noBtn.style.display = "none";
  
}

// автообновление
setInterval(loadAnswers, 3000);
loadAnswers();
</script>

</body>
</html>
