<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ввод имени</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #e0ecff 0%, #eef4ff 100%);
      color: #0f172a;
    }

    /* ===== WAITING SCREEN ===== */

    #waitingScreen {
      position: fixed;
      inset: 0;
      background: #091228;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      overflow: hidden;
      transition: opacity 0.65s ease;
    }

    #waitingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      will-change: transform;
    }

    .blob-blue {
      width: 520px;
      height: 520px;
      background: rgba(37, 99, 235, 0.32);
      top: -160px;
      left: -120px;
      animation: blobDrift 12s ease-in-out infinite;
    }

    .blob-purple {
      width: 460px;
      height: 460px;
      background: rgba(109, 40, 217, 0.25);
      bottom: -130px;
      right: -110px;
      animation: blobDrift 15s ease-in-out infinite reverse;
    }

    @keyframes blobDrift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -20px) scale(1.08); }
      66%       { transform: translate(-20px, 30px) scale(0.94); }
    }

    #particlesContainer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: riseUp linear infinite;
      will-change: transform, opacity;
    }

    @keyframes riseUp {
      0%   { transform: translateY(0) scale(0.4); opacity: 0; }
      12%  { opacity: 1; }
      88%  { opacity: 0.4; }
      100% { transform: translateY(-88vh) scale(0.9); opacity: 0; }
    }

    .waiting-content {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 0 24px;
    }

    .waiting-title {
      margin: 0 0 22px;
      font-size: 52px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow:
        0 0 24px rgba(56, 189, 248, 0.75),
        0 0 64px rgba(37, 99, 235, 0.4);
      animation: titleFloat 5s ease-in-out infinite;
    }

    @keyframes titleFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .waiting-subtitle {
      margin: 0;
      font-size: 17px;
      color: #475569;
      letter-spacing: 0.03em;
    }

    /* ===== REGISTER SCREEN ===== */

    #registerScreen {
      display: none;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      justify-content: center;
      align-items: center;
      padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container {
      width: 100%;
      max-width: 420px;
      min-height: 320px;
      max-height: 94vh;
      background: #ffffff;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    input {
      width: 100%;
      max-width: 100%;
      padding: 16px 18px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      color: #0f172a;
      background: #f8fafc;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      max-width: 100%;
      padding: 16px 18px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
    }

    .error-message {
      margin: 0;
      color: #b91c1c;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.4;
      display: none;
      text-align: left;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 480px) {
      .waiting-title {
        font-size: 36px;
      }

      .waiting-subtitle {
        font-size: 15px;
      }

      .container {
        padding: 18px;
        border-radius: 20px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- Waiting screen -->
  <div id="waitingScreen">
    <div class="glow-blob blob-blue"></div>
    <div class="glow-blob blob-purple"></div>
    <div id="particlesContainer"></div>
    <div class="waiting-content">
      <h1 class="waiting-title">Кто тут умный?</h1>
      <p class="waiting-subtitle">Подождите начала игры<span id="waitingDots"></span></p>
    </div>
  </div>

  <!-- Registration screen -->
  <div id="registerScreen">
    <div class="container">
      <h2 id="containerTitle">Введите имя</h2>
      <div id="formFields">
        <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="40" oninput="handleNameInput()" />
        <p id="errorMessage" class="error-message"></p>
        <button onclick="submitName()">Отправить</button>
      </div>
      <p id="gameInProgressMsg" style="display:none; margin:0; color:#475569; font-size:15px; line-height:1.5;">
        Игра уже началась.<br>Регистрация новых игроков закрыта.
      </p>
    </div>
  </div>

  <script>
    // ===== WAITING SCREEN =====

    (function createParticles() {
      const container = document.getElementById("particlesContainer");
      const colors = [
        "rgba(56, 189, 248, 0.7)",
        "rgba(37, 99, 235, 0.6)",
        "rgba(147, 197, 253, 0.5)",
        "rgba(255, 255, 255, 0.2)",
      ];
      for (let i = 0; i < 22; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        const size = Math.random() * 4 + 2;
        p.style.cssText = [
          `width:${size}px`,
          `height:${size}px`,
          `left:${(Math.random() * 100).toFixed(1)}%`,
          `bottom:${(Math.random() * 25).toFixed(1)}%`,
          `background:${colors[Math.floor(Math.random() * colors.length)]}`,
          `animation-duration:${(Math.random() * 8 + 7).toFixed(1)}s`,
          `animation-delay:${(Math.random() * 10).toFixed(1)}s`,
        ].join(";");
        container.appendChild(p);
      }
    })();

    let dotsCount = 0;
    setInterval(() => {
      dotsCount = (dotsCount + 1) % 4;
      document.getElementById("waitingDots").textContent = ".".repeat(dotsCount);
    }, 500);

    function checkGameStatus() {
      fetch("/game/status")
        .then(r => r.json())
        .then(data => {
          if (data.started) {
            const sessionId = localStorage.getItem("session_id");
            if (sessionId) {
              const localGameId = localStorage.getItem("game_id");
              const serverGameId = String(data.game_id);
              if (!localGameId || localGameId !== serverGameId) {
                localStorage.removeItem("session_id");
                localStorage.removeItem("user_name");
                localStorage.removeItem("game_id");
                showRegisterScreen();
              } else {
                fetch(`/answers/by-session/${sessionId}`)
                  .then(r => {
                    if (r.ok) {
                      document.documentElement.style.background = "#0d1b3e";
                      document.getElementById("waitingScreen").classList.add("hidden");
                      setTimeout(() => { window.location.href = "questions.html?t=" + Date.now(); }, 650);
                    } else {
                      localStorage.removeItem("session_id");
                      localStorage.removeItem("user_name");
                      showRegisterScreen();
                    }
                  })
                  .catch(() => setTimeout(checkGameStatus, 3000));
              }
            } else {
              showRegisterScreen();
            }
          } else {
            setTimeout(checkGameStatus, 2000);
          }
        })
        .catch(() => setTimeout(checkGameStatus, 3000));
    }

    function showScreen(gameStarted) {
      const waitingScreen = document.getElementById("waitingScreen");
      const registerScreen = document.getElementById("registerScreen");
      waitingScreen.classList.add("hidden");
      setTimeout(() => {
        waitingScreen.style.display = "none";
        if (gameStarted) {
          document.getElementById("containerTitle").textContent = "Игра началась";
          document.getElementById("formFields").style.display = "none";
          document.getElementById("gameInProgressMsg").style.display = "block";
        }
        registerScreen.style.display = "flex";
      }, 650);
    }

    function showRegisterScreen() {
      showScreen(false);
    }

    window.addEventListener("pageshow", e => { if (e.persisted) location.reload(true); });
    checkGameStatus();

    // ===== REGISTER SCREEN =====

    async function submitName() {
      const name = document.getElementById("nameInput").value.trim();
      const errorMessage = document.getElementById("errorMessage");

      errorMessage.textContent = "";
      errorMessage.classList.remove("show");

      if (!name) {
        errorMessage.textContent = "Пожалуйста, укажите имя.";
        errorMessage.classList.add("show");
        return;
      }

      if (name.length > 40) {
        errorMessage.textContent = "Имя не должно превышать 40 символов.";
        errorMessage.classList.add("show");
        return;
      }

      if (!nameIncludesSymbols(name)) {
        errorMessage.textContent = "Имя может содержать только латинские/кириллические буквы и цифры.";
        errorMessage.classList.add("show");
        return;
      }

      const response = await fetch("/session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      });

      const data = await response.json().catch(() => null);
      if (!response.ok) {
        const message = data?.detail || `Ошибка сервера: ${response.status}`;
        errorMessage.textContent = message;
        errorMessage.classList.add("show");
        return;
      }

      localStorage.setItem("session_id", data.session_id);
      localStorage.setItem("user_name", name);

      window.location.href = "questions.html?t=" + Date.now();
    }

    function nameIncludesSymbols(name) {
      if (typeof name !== "string") return false;
      return /^[A-Za-z0-9Ѐ-ӿ]+$/.test(name);
    }

    function handleNameInput() {
      const input = document.getElementById("nameInput");
      if (input.value.length > 40) {
        input.value = input.value.slice(0, 40);
      }
    }
  </script>

</body>
</html>
