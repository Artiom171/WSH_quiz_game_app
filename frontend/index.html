<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ввод имени</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
      color: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
    }

    .container {
      width: 100%;
      max-width: 420px;
      min-height: 320px;
      max-height: 94vh;
      background: #ffffff;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      overflow: hidden;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    input {
      width: 100%;
      max-width: 100%;
      padding: 16px 18px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      font-size: 16px;
      outline: none;
      color: #0f172a;
      background: #f8fafc;
    }

    button {
      width: 100%;
      max-width: 100%;
      padding: 16px 18px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
    }

    .error-message {
      margin: 0;
      color: #b91c1c;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.4;
      display: none;
      text-align: left;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 18px;
        border-radius: 20px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Введите имя</h2>

    <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="40" oninput="handleNameInput()" />
    <p id="errorMessage" class="error-message"></p>
    <button onclick="submitName()">Отправить</button>

    <p id="result"></p>
  </div>

  <script>
    async function submitName() {
      const name = document.getElementById("nameInput").value.trim();
      const errorMessage = document.getElementById("errorMessage");

      errorMessage.textContent = "";
      errorMessage.classList.remove("show");

      if (!name) {
        errorMessage.textContent = "Пожалуйста, укажите имя.";
        errorMessage.classList.add("show");
        return;
      }

      if (name.length > 40) {
        errorMessage.textContent = "Имя не должно превышать 40 символов.";
        errorMessage.classList.add("show");
        return;
      }

      if (!nameIncludesSymbols(name)) {
        errorMessage.textContent = "Имя может содержать только буквы и цифры.";
        errorMessage.classList.add("show");
        return;
      }

      const response = await fetch("/session", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name })
      });

      const data = await response.json().catch(() => null);
      if (!response.ok) {
        const message = data?.detail || `Ошибка сервера: ${response.status}`;
        errorMessage.textContent = message;
        errorMessage.classList.add("show");
        return;
      }

      // сохраняем session_id
      localStorage.setItem("session_id", data.session_id);
      localStorage.setItem("user_name", name);

      // переход на страницу вопроса
      window.location.href = "questions.html";
    }

    function nameIncludesSymbols(name) {
      if (typeof name !== "string") {
        return false;
      }
      return /^[A-Za-z0-9]+$/.test(name);
    }

    function handleNameInput() {
      const input = document.getElementById("nameInput");
      if (input.value.length > 40) {
        input.value = input.value.slice(0, 40);
      }
    }
  </script>

</body>
</html>
