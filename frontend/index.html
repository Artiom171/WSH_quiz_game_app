<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ввод имени</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #0f172a;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    h2 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px;
        border-radius: 20px;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Введите имя</h2>

    <input type="text" id="nameInput" placeholder="Ваше имя" />
    <br />
    <button onclick="submitName()">Submit</button>

    <p id="result"></p>
  </div>

  <script>
   async function submitName() {
  const name = document.getElementById("nameInput").value;

  if (!name) {
    alert("Введите имя");
    return;
  }

  const response = await fetch("/session", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name })
  });

  const data = await response.json().catch(() => null);
  if (!response.ok || !data) {
    alert(`Ошибка сервера при создании сессии: ${response.status}`);
    return;
  }

  // 🔥 сохраняем session_id
  localStorage.setItem("session_id", data.session_id);
  localStorage.setItem("user_name", name);

  // 🔥 переход на страницу вопроса
  window.location.href = "questions.html";
}
  </script>

</body>
</html>
