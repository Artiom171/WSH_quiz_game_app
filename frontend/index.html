<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Ввод имени</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      padding: 10px;
      width: 200px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Введите имя</h2>

    <input type="text" id="nameInput" placeholder="Ваше имя" />
    <br />
    <button onclick="submitName()">Submit</button>

    <p id="result"></p>
  </div>

  <script>
   async function submitName() {
  const name = document.getElementById("nameInput").value;

  if (!name) {
    alert("Введите имя");
    return;
  }

  const response = await fetch("http://192.168.1.18:8000/session", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name })
  });

  const data = await response.json();

  // 🔥 сохраняем session_id
  localStorage.setItem("session_id", data.session_id);
  localStorage.setItem("user_name", name);

  // 🔥 переход на страницу вопроса
  window.location.href = "questions.html";
}
  </script>

</body>
</html>
