<table>
  <thead>
    <tr>
      <th>Игрок</th>
      <th>Баллы</th>
    </tr>
  </thead>
  <tbody id="resultsTable"></tbody>
  <script>
  async function loadResults() {
  const res = await fetch("http://192.168.1.18:8000/results");
  const data = await res.json();

  const table = document.getElementById("resultsTable");
  table.innerHTML = "";

  data.forEach(user => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${user.name}</td>
      <td>${user.score}</td>
    `;

    table.appendChild(row);
  });
}

loadResults();
  </script>
</table>
