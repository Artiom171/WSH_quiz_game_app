<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Финальный результат</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #f3f6ff 0%, #eef2ff 100%);
      color: #0f172a;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    h2 {
      font-size: 32px;
      margin: 0 0 16px;
      text-align: center;
      color: #111827;
    }

    p.subtitle {
      text-align: center;
      margin: 0 0 12px;
      color: #475569;
      font-size: 15px;
    }

    p.note {
      text-align: center;
      margin: 0 0 24px;
      color: #64748b;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 18px;
      background: #ffffff;
    }

    thead {
      background: linear-gradient(90deg, #2563eb 0%, #3b82f6 100%);
    }

    th, td {
      padding: 16px 18px;
      text-align: left;
    }

    th {
      color: #ffffff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    tbody tr {
      border-bottom: 1px solid #e2e8f0;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:nth-child(even) {
      background: #f8fafc;
    }

    tbody tr:hover {
      background: #eff6ff;
    }

    td.rank {
      width: 72px;
      font-weight: 700;
      color: #1e3a8a;
    }

    .reset-container {
      text-align: right;
      margin-top: 20px;
    }

    .danger-button {
      border: none;
      background: #ef4444;
      color: #ffffff;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }

    .danger-button:hover {
      background: #dc2626;
      transform: translateY(-1px);
    }

    td.score {
      font-weight: 600;
      color: #0f172a;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Финальный результат</h2>
    <p class="subtitle">Таблица игроков, отсортированная по баллам от большего к меньшему.</p>
    <p class="note">Показываются все зарегистрированные игроки, даже если они еще не дали ни одного ответа.</p>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Игрок</th>
          <th>Баллы</th>
        </tr>
      </thead>
      <tbody id="resultsTable"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none;">Пока нет результатов.</div>
    <div class="reset-container">
      <button id="resetButton" class="danger-button" type="button">Очистить базу данных</button>
    </div>
  </div>

  <script>
    async function loadResults() {
      const res = await fetch("/results");
      const data = await res.json();

      const table = document.getElementById("resultsTable");
      const emptyState = document.getElementById("emptyState");
      table.innerHTML = "";

      if (!data || data.length === 0) {
        emptyState.textContent = "Пока нет зарегистрированных игроков.";
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      data.forEach((user, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="rank">${index + 1}</td>
          <td>${user.name}</td>
          <td class="score">${user.score ?? 0}</td>
        `;
        table.appendChild(row);
      });
    }

    async function resetDatabase() {
      if (!confirm('Вы уверены? Это удалит все данные в базе.')) {
        return;
      }

      const res = await fetch('/reset', { method: 'DELETE' });
      if (res.ok) {
        loadResults();
      } else {
        alert('Ошибка при очистке базы данных');
      }
    }

    document.getElementById('resetButton').addEventListener('click', resetDatabase);
    loadResults();
    setInterval(loadResults, 3000);
  </script>
</body>
</html>
